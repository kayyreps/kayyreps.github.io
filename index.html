<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYYREPS | MULEBUY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #ffffff 0%, #ffffff 50%, #1a1a1a 80%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        header, .nav-section { color: #000000; }
        .product-card { background: #000000; border: 1px solid #222222; transition: all 0.3s ease; }
        .product-card:hover { border-color: #ffffff; transform: translateY(-3px); }
        .category-btn { border: 2px solid #000000; color: #000000; padding: 10px 24px; font-size: 14px; font-weight: 900; text-transform: uppercase; background: transparent; }
        .category-btn:hover, .category-btn.active { background: #000000; color: #ffffff; }
        .search-input { background: transparent; border: none; border-bottom: 5px solid #000000; color: #000000; font-weight: 900; text-transform: uppercase; }
        .search-input:focus { outline: none; }
        .search-input::placeholder { color: #555555; font-weight: 800; }
        .info-label { font-size: 9px; color: #666666; font-weight: 900; text-transform: uppercase; }
        .info-value { font-size: 13px; color: #ffffff; font-weight: 800; }
        .highlight-box { border: 1px solid #333333; padding: 6px 10px; background: #0a0a0a; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex flex-col items-center py-12 mb-6">
        <img src="https://i.imgur.com/1dA1uNB.png" alt="KAYYREPS" class="h-24 md:h-32 mb-8">
        <div class="inline-block border-[6px] border-black px-10 py-4">
            <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter italic">Mulebuy Sheet</h1>
        </div>
    </header>

    <div class="max-w-5xl mx-auto mb-32 nav-section">
        <div class="relative mb-12">
            <input type="text" id="searchInput" placeholder="WPISZ CZEGO SZUKASZ..." 
                   class="search-input w-full p-4 text-3xl md:text-6xl focus:outline-none transition">
        </div>
        
        <div class="flex flex-wrap gap-4 justify-center">
            <button onclick="filterCategory('All')" class="category-btn active">Wszystko</button>
            <button onclick="filterCategory('Shoes')" class="category-btn">Buty</button>
            <button onclick="filterCategory('Clothing')" class="category-btn">Ubrania</button>
            <button onclick="filterCategory('Accessories')" class="category-btn">Akcesoria</button>
            <button onclick="filterCategory('Bestseller')" class="category-btn !bg-black !text-white">Bestsellery</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6">
            </div>
    </main>

    <footer class="text-center mt-40 py-12">
        <p class="text-[10px] font-black tracking-[0.4em] text-white/20 uppercase">Kayyreps &copy; 2026</p>
    </footer>

    <script>
        const products = [
            { name: "Jordan 4 Black Cat", category: "Shoes", price: "¥460", weight: "1450g", img: "https://via.placeholder.com/400x400?text=J4+Black+Cat", link: "#", bestseller: true },
            { name: "Essentials Hoodie", category: "Clothing", price: "¥128", weight: "850g", img: "https://via.placeholder.com/400x400?text=Essentials", link: "#", bestseller: false },
            { name: "Yeezy Slide", category: "Shoes", price: "¥110", weight: "600g", img: "https://via.placeholder.com/400x400?text=Yeezy", link: "#", bestseller: true },
            { name: "LV Belt", category: "Accessories", price: "¥210", weight: "400g", img: "https://via.placeholder.com/400x400?text=LV+Belt", link: "#", bestseller: false },
            { name: "Nike Tech", category: "Clothing", price: "¥240", weight: "1100g", img: "https://via.placeholder.com/400x400?text=Nike+Tech", link: "#", bestseller: true },
            { name: "Dunk Panda", category: "Shoes", price: "¥190", weight: "1200g", img: "https://via.placeholder.com/400x400?text=Panda", link: "#", bestseller: false },
            { name: "Trapstar Set", category: "Clothing", price: "¥320", weight: "1300g", img: "https://via.placeholder.com/400x400?text=Trapstar", link: "#", bestseller: true },
            { name: "Bapesta White", category: "Shoes", price: "¥380", weight: "1400g", img: "https://via.placeholder.com/400x400?text=Bapesta", link: "#", bestseller: false },
            { name: "Arc'teryx", category: "Clothing", price: "¥450", weight: "700g", img: "https://via.placeholder.com/400x400?text=Arcteryx", link: "#", bestseller: true },
            { name: "Goyard Card", category: "Accessories", price: "¥35", weight: "50g", img: "https://via.placeholder.com/400x400?text=Goyard", link: "#", bestseller: false },
            { name: "Jordan 1 High", category: "Shoes", price: "¥320", weight: "1300g", img: "https://via.placeholder.com/400x400?text=Jordan+1", link: "#", bestseller: false },
            { name: "Balenciaga Tee", category: "Clothing", price: "¥140", weight: "350g", img: "https://via.placeholder.com/400x400?text=Balenciaga", link: "#", bestseller: true }
        ];

        function displayProducts(items) {
            const grid = document.getElementById('productGrid');
            if(!grid) return;
            grid.innerHTML = items.map(p => `
                <div class="product-card flex flex-col h-full shadow-xl">
                    <div class="aspect-square w-full overflow-hidden bg-white/5 border-b border-white/10">
                        <img src="${p.img}" class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500">
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <p class="text-[9px] font-black text-white/30 uppercase tracking-[0.2em] mb-1">${p.category}</p>
                        <h3 class="font-black text-[11px] uppercase italic leading-tight mb-4 min-h-[24px]">${p.name}</h3>
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <div class="highlight-box">
                                <span class="info-label text-[8px]">Waga</span>
                                <p class="info-value text-[11px]">${p.weight}</p>
                            </div>
                            <div class="highlight-box">
                                <span class="info-label text-[8px]">Koszt</span>
                                <p class="info-value text-[11px]">${p.price}</p>
                            </div>
                        </div>
                        <div class="mt-auto">
                            <a href="${p.link}" target="_blank" class="block w-full text-center bg-white text-black py-2.5 text-[10px] font-black uppercase tracking-[0.1em] hover:bg-gray-200 transition">
                                MULEBUY
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Event listener dla wyszukiwarki
        document.addEventListener('DOMContentLoaded', () => {
            const search = document.getElementById('searchInput');
            search.addEventListener('input', (e) => {
                const val = e.target.value.toLowerCase();
                const filtered = products.filter(p => p.name.toLowerCase().includes(val));
                displayProducts(filtered);
            });
            displayProducts(products); // Start
        });

        function filterCategory(cat) {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(b => b.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');

            if(cat === 'All') return displayProducts(products);
            const filtered = products.filter(p => p.category === cat || (cat === 'Bestseller' && p.bestseller));
            displayProducts(filtered);
        }
    </script>
</body>
</html>
