<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYYREPS | MULEBUY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(180deg, #ffffff 0%, #ffffff 50%, #1a1a1a 80%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        header, .nav-section { color: #000000; }

        .product-card {
            background: #000000;
            border: 1px solid #222222;
            transition: all 0.3s ease;
        }

        .product-card:hover { border-color: #ffffff; }

        .category-btn {
            border: 2px solid #000000;
            color: #000000;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            background: transparent;
        }

        .category-btn:hover, .category-btn.active {
            background: #000000;
            color: #ffffff;
        }

        /* Wyszukiwarka - czarny tekst i linia */
        .search-input {
            background: transparent;
            border: none;
            border-bottom: 5px solid #000000;
            color: #000000; /* Czarny tekst */
            font-weight: 900;
            text-transform: uppercase;
        }

        .search-input:focus { outline: none; }
        .search-input::placeholder { color: #555555; font-weight: 800; }

        /* Styl detali produktu */
        .info-label { font-size: 10px; color: #888888; font-weight: 900; text-transform: uppercase; }
        .info-value { font-size: 14px; color: #ffffff; font-weight: 700; }
        .highlight-box { border: 1px solid #444444; padding: 8px; background: #111111; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex flex-col items-center py-12 mb-6">
        <img src="https://i.imgur.com/1dA1uNB.png" alt="KAYYREPS" class="h-24 md:h-32 mb-8">
        <div class="inline-block border-[6px] border-black px-10 py-4">
            <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter italic">Mulebuy Sheet</h1>
        </div>
    </header>

    <div class="max-w-5xl mx-auto mb-32 nav-section">
        <div class="relative mb-12">
            <input type="text" id="searchInput" placeholder="WPISZ CZEGO SZUKASZ..." 
                   class="search-input w-full p-4 text-3xl md:text-6xl focus:outline-none transition">
        </div>
        
        <div class="flex flex-wrap gap-4 justify-center">
            <button onclick="filterCategory('All')" class="category-btn active">Wszystko</button>
            <button onclick="filterCategory('Shoes')" class="category-btn">Buty</button>
            <button onclick="filterCategory('Clothing')" class="category-btn">Ubrania</button>
            <button onclick="filterCategory('Accessories')" class="category-btn">Akcesoria</button>
            <button onclick="filterCategory('Bestseller')" class="category-btn !bg-black !text-white">Bestsellery</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="text-center mt-40 py-12">
        <p class="text-[10px] font-black tracking-[0.4em] text-white/20 uppercase">Kayyreps &copy; 2026</p>
    </footer>

    <script>
        // Baza produktów z Opisem, Wagą i Kosztem
        const products = [
            { 
                name: "Jordan 4 Black Cat (GX Batch)", 
                category: "Shoes", 
                price: "¥460", 
                weight: "1450g",
                description: "Najlepszy batch pod względem materiałów. Podeszwa nie pęka, zamsz żyje.",
                img: "https://via.placeholder.com/400x400?text=Jordan+4+Black+Cat", 
                link: "#", 
                bestseller: true 
            },
            { 
                name: "Essentials Hoodie Black", 
                category: "Clothing", 
                price: "¥128", 
                weight: "850g",
                description: "Gruby materiał, oversize fit. Metki 1:1.",
                img: "https://via.placeholder.com/400x400?text=Essentials+Hoodie", 
                link: "#", 
                bestseller: false 
            }
        ];

        function displayProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="product-card flex flex-col h-full shadow-2xl overflow-hidden">
                    <div class="aspect-square w-full overflow-hidden bg-white/5 border-b border-white/10">
                        <img src="${p.img}" class="w-full h-full object-cover">
                    </div>
                    
                    <div class="p-6 flex flex-col flex-grow">
                        <p class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-2">${p.category}</p>
                        <h3 class="font-black text-xl uppercase italic leading-none mb-4">${p.name}</h3>
                        
                        <p class="text-xs text-gray-400 mb-6 leading-relaxed">${p.description}</p>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="highlight-box">
                                <span class="info-label">Waga:</span>
                                <p class="info-value text-white">${p.weight}</p>
                            </div>
                            <div class="highlight-box border-white/40">
                                <span class="info-label text-white/60">Koszt:</span>
                                <p class="info-value text-white">${p.price}</p>
                            </div>
                        </div>

                        <div class="mt-auto">
                            <a href="${p.link}" target="_blank" class="block w-full text-center bg-white text-black py-4 text-xs font-black uppercase tracking-[0.2em] hover:bg-gray-300 transition duration-300 shadow-[4px_4px_0px_0px_rgba(255,255,255,0.3)]">
                                Otwórz w Mulebuy
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            displayProducts(products.filter(p => p.name.toLowerCase().includes(val)));
        });

        function filterCategory(cat) {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(cat === 'All') return displayProducts(products);
            displayProducts(products.filter(p => p.category === cat || (cat === 'Bestseller' && p.bestseller)));
        }

        displayProducts(products);
    </script>
</body>
</html>
