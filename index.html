<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYYREPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-black">

    <header class="flex flex-col items-center py-12 border-b border-black">
        <img src="https://i.imgur.com/1dA1uNB.png" alt="Logo" class="h-20 mb-4">
        <h1 class="text-3xl font-black uppercase tracking-tighter">Mulebuy Sheet</h1>
    </header>

    <div class="max-w-4xl mx-auto p-6">
        <input type="text" id="search" placeholder="SZUKAJ..." class="w-full p-4 border-2 border-black font-bold uppercase mb-8 focus:outline-none">
        
        <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        const products = [
            { name: "Jordan 4", price: "¥250", link: "#", img: "https://via.placeholder.com/400" },
            { name: "Dunk Low", price: "¥190", link: "#", img: "https://via.placeholder.com/400" }
        ];

        function show(list) {
            document.getElementById('grid').innerHTML = list.map(p => `
                <div class="border border-black p-2 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    <img src="${p.img}" class="w-full aspect-square object-cover mb-2 border-b border-black">
                    <p class="font-black text-sm uppercase">${p.name}</p>
                    <p class="text-lg font-bold mb-3">${p.price}</p>
                    <a href="${p.link}" target="_blank" class="block w-full text-center bg-black text-white py-2 text-xs font-bold uppercase">Link</a>
                </div>
            `).join('');
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            show(products.filter(p => p.name.toLowerCase().includes(val)));
        });

        show(products);
    </script>
</body>
</html>
