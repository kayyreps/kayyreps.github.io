<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAYYREPS | MULEBUY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Obniżony gradient - góra zostaje biała dłużej */
        body {
            background: linear-gradient(180deg, #ffffff 0%, #ffffff 40%, #1a1a1a 70%, #000000 100%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        /* Sekcja nagłówka i wyszukiwarki wymusza czarny tekst na białym tle */
        header, .nav-section {
            color: #000000;
        }

        .product-card {
            background: #000000;
            border: 1px solid #222222;
            transition: all 0.2s ease;
        }

        .product-card:hover {
            border-color: #ffffff;
            transform: translateY(-2px);
        }

        /* Ultra bold kategorie */
        .category-btn {
            border: 2px solid #000000;
            color: #000000;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s;
            background: transparent;
        }

        .category-btn:hover, .category-btn.active {
            background: #000000;
            color: #ffffff;
        }

        /* Wyszukiwarka - gruba linia */
        .search-input {
            background: transparent;
            border: none;
            border-bottom: 4px solid #000000;
            color: #000000;
            font-weight: 900;
            text-transform: uppercase;
        }

        .search-input:focus {
            outline: none;
        }

        .search-input::placeholder {
            color: #aaaaaa;
            font-weight: 400;
            text-transform: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex flex-col items-center py-12 mb-6">
        <img src="https://i.imgur.com/1dA1uNB.png" alt="KAYYREPS" class="h-24 md:h-32 mb-8">
        <div class="inline-block border-[6px] border-black px-10 py-4">
            <h1 class="text-3xl md:text-5xl font-black uppercase tracking-tighter italic">Mulebuy Sheet</h1>
        </div>
    </header>

    <div class="max-w-5xl mx-auto mb-32 nav-section">
        <div class="relative mb-12">
            <input type="text" id="searchInput" placeholder="SZUKAJ..." 
                   class="search-input w-full p-4 text-2xl md:text-5xl focus:outline-none transition">
        </div>
        
        <div class="flex flex-wrap gap-4 justify-center">
            <button onclick="filterCategory('All')" class="category-btn active">Wszystko</button>
            <button onclick="filterCategory('Shoes')" class="category-btn">Buty</button>
            <button onclick="filterCategory('Clothing')" class="category-btn">Ubrania</button>
            <button onclick="filterCategory('Accessories')" class="category-btn">Akcesoria</button>
            <button onclick="filterCategory('Bestseller')" class="category-btn !bg-black !text-white">Bestsellery</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-10">
            </div>
    </main>

    <footer class="text-center mt-40 py-12">
        <p class="text-[10px] font-black tracking-[0.4em] text-white/20 uppercase">Kayyreps &copy; 2026</p>
    </footer>

    <script>
        const products = [
            { 
                name: "Jordan 4 Black Cat", 
                category: "Shoes", 
                price: "¥250", 
                img: "https://via.placeholder.com/400x400?text=QC+PHOTO", 
                link: "#", 
                bestseller: true 
            },
            { 
                name: "Essentials Hoodie", 
                category: "Clothing", 
                price: "¥160", 
                img: "https://via.placeholder.com/400x400?text=QC+PHOTO", 
                link: "#", 
                bestseller: false 
            }
        ];

        function displayProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(p => `
                <div class="product-card p-4 flex flex-col h-full shadow-2xl">
                    <div class="aspect-square w-full overflow-hidden bg-white/5 mb-6">
                        <img src="${p.img}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-grow">
                        <p class="text-[10px] font-black text-white/30 uppercase tracking-[0.2em] mb-2">${p.category}</p>
                        <h3 class="font-black text-base uppercase leading-none mb-6 italic">${p.name}</h3>
                    </div>
                    <div class="mt-auto">
                        <p class="text-2xl font-black mb-6 tracking-tighter">${p.price}</p>
                        <a href="${p.link}" target="_blank" class="block w-full text-center bg-white text-black py-4 text-[11px] font-black uppercase tracking-[0.2em] hover:invert transition duration-300">
                            Get Link
                        </a>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            displayProducts(products.filter(p => p.name.toLowerCase().includes(val)));
        });

        function filterCategory(cat) {
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(b => b.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(cat === 'All') return displayProducts(products);
            displayProducts(products.filter(p => p.category === cat || (cat === 'Bestseller' && p.bestseller)));
        }

        displayProducts(products);
    </script>
</body>
</html>
